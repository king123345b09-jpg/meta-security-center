<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ موقع المراجعة بتركيز </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #040610;
            --card-bg: #0B0F1F;
            --neon-color: #00F0FF;
            --neon-green: #39FF14;
            --neon-red: #FF3131;
            --text-light: #F8FAFC;
            --border-glow: rgba(0, 240, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: all 0.3s ease; }
        body { background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .container { width: 100%; max-width: 900px; background: var(--card-bg); border: 2px solid var(--neon-color); border-radius: 25px; padding: 30px; box-shadow: 0 0 40px var(--border-glow); }
        
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px dashed rgba(255,255,255,0.1); padding-bottom: 15px; }
        .header h1 { font-size: 2.2rem; font-weight: 900; color: var(--neon-color); text-shadow: 0 0 20px var(--neon-color); }
        
        .step-panel { display: none; }
        .step-panel.active { display: block; animation: fadeIn 0.4s ease forwards; }

        label { display: block; font-size: 1.2rem; margin-bottom: 12px; font-weight: 600; color: #CBD5E1; text-align: center; }
        .input-field { width: 100%; padding: 15px; background: #060914; border: 2px solid #1E293B; border-radius: 14px; color: #FFF; font-size: 1.1rem; outline: none; text-align: center; margin-bottom: 20px; }
        .input-field:focus { border-color: var(--neon-color); box-shadow: 0 0 15px var(--border-glow); }

        .action-btn { padding: 12px 30px; background: var(--neon-color); border: none; color: #040610; font-weight: 800; font-size: 1.1rem; border-radius: 12px; cursor: pointer; box-shadow: 0 0 15px var(--neon-color); }
        .action-btn:hover { transform: scale(1.03); filter: brightness(1.2); }

        /* اللوحة الرئيسية للمراجعة */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }

        .panel-box { background: #060914; border: 2px solid #1E293B; border-radius: 20px; padding: 20px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .panel-box h2 { font-size: 1.4rem; color: var(--neon-color); margin-bottom: 15px; text-shadow: 0 0 10px var(--neon-color); text-align: center; border-bottom: 1px solid #1E293B; padding-bottom: 8px; }

        /* ستايل قائمة الأهداف اليومية */
        .todo-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .todo-input { flex: 1; padding: 10px; background: var(--bg-dark); border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 1rem; }
        .add-todo-btn { background: var(--neon-green); color: #040610; font-weight: bold; padding: 0 15px; border-radius: 8px; border: none; cursor: pointer; box-shadow: 0 0 10px var(--neon-green); }
        
        .todo-list { list-style: none; max-height: 250px; overflow-y: auto; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1E293B; cursor: pointer; }
        .todo-item:hover { border-color: var(--neon-color); background: rgba(0,240,255,0.02); }
        .todo-text { font-weight: 600; flex: 1; margin-right: 10px; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: #64748B; }
        .todo-item.completed { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.03); }
        
        .check-icon { font-size: 1.2rem; color: #64748B; }
        .todo-item.completed .check-icon { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .delete-btn { background: none; border: none; color: var(--neon-red); font-weight: bold; cursor: pointer; margin-right: 10px; font-size: 1.1rem; }

        /* ستايل عداد البومودورو */
        .timer-display { font-size: 3.5rem; font-weight: 900; text-align: center; margin: 20px 0; color: #FFF; text-shadow: 0 0 20px rgba(255,255,255,0.2); letter-spacing: 2px; }
        .timer-status { text-align: center; font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--neon-green); }
        .timer-controls { display: flex; gap: 10px; justify-content: center; }
        .timer-btn { padding: 10px 20px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        .btn-start { background: var(--neon-green); color: #040610; box-shadow: 0 0 10px var(--neon-green); }
        .btn-pause { background: #FFB000; color: #040610; }
        .btn-reset { background: var(--neon-red); color: #FFF; box-shadow: 0 0 10px var(--neon-red); }

        /* شريط الإنجاز والمعلومات الإضافية */
        .user-stats { background: rgba(0, 240, 255, 0.03); border: 1px dashed var(--neon-color); border-radius: 15px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; text-align: center; }
        .progress-container { width: 100%; background: #1E293B; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-color), var(--neon-green)); box-shadow: 0 0 10px var(--neon-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="header">
            <h1>⚡ موقع المراجعة الشامل</h1>
        </div>

        <!-- الخطوة 1: طلب الاسم -->
        <div class="step-panel active" id="step1">
            <label for="userName">السلام علكم! واش اسمك؟</label>
            <input type="text" id="userName" class="input-field" placeholder="اكتب اسمك هنا..." autocomplete="off">
            <div style="text-align: center;">
                <button class="action-btn" onclick="goToStep2()">التالي ➡️</button>
            </div>
        </div>

        <!-- الخطوة 2: تحديد وقت الدراسة اليومي -->
        <div class="step-panel" id="step2">
            <label id="timeLabel">شحال من ساعة تستطيع تخصيصها للمراجعة؟</label>
            <input type="number" id="studyHours" class="input-field" placeholder="مثال: 3" min="1" max="24">
            <div style="text-align: center; display: flex; gap: 15px; justify-content: center;">
                <button class="action-btn" style="background:#1E293B; color:#FFF;" onclick="switchPanel(2,1)">رجوع</button>
                <button class="action-btn" onclick="initializeDashboard()">افتح واجهة المراجعة 🔥</button>
            </div>
        </div>

        <!-- الخطوة 3: لوحة التحكم الرئيسية (المراجعة الفعالة) -->
        <div class="step-panel" id="step3">
            
            <!-- شريط معلومات التحدي والتقدم اليومي -->
            <div class="user-stats">
                <div>👨‍💻 الطالب: <span id="statName" style="color:var(--neon-color); font-weight:bold;">هيثم</span></div>
                <div>🎯 هدف اليوم: <span id="statHours" style="color:var(--neon-color); font-weight:bold;">3</span> ساعات مراجعة</div>
                <div>✅ الأهداف المكتملة: <span id="statCompleted" style="color:var(--neon-green); font-weight:bold;">0/0</span></div>
                
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>

            <div class="dashboard">
                <!-- قسم أهداف اليوم (To-Do List) -->
                <div class="panel-box">
                    <h2>🎯 أهداف اليوم</h2>
                    <div class="todo-input-group">
                        <input type="text" id="todoInput" class="todo-input" placeholder="مثال: حل موضوع فيزياء بيام..." onkeypress="if(event.key === 'Enter') addTodo()">
                        <button class="add-todo-btn" onclick="addTodo()">إضافة</button>
                    </div>
                    <ul class="todo-list" id="todoList">
                        <!-- الأهداف تضاف هنا ديناميكياً -->
                    </ul>
                </div>

                <!-- قسم عداد البومودورو (Pomodoro) -->
                <div class="panel-box" style="position: relative;">
                    <h2>⏱️ تقنية البومودورو للتركيز</h2>
                    <div class="timer-status" id="timerStatus">جلسة تركيز ومراجعة (25 د)</div>
                    <div class="timer-display" id="timerDisplay">25:00</div>
                    
                    <div class="timer-controls">
                        <button class="timer-btn btn-start" id="btnStart" onclick="startTimer()">ابدأ 🚀</button>
                        <button class="timer-btn btn-pause" id="btnPause" onclick="pauseTimer()" style="display:none;">إيقاف</button>
                        <button class="timer-btn btn-reset" onclick="resetTimer()">إعادة</button>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 25px;">
                <button class="action-btn" style="background:var(--neon-red); color:white; box-shadow: 0 0 10px var(--neon-red);" onclick="resetEverything()">تصفير وإنشاء يوم جديد 🔄</button>
            </div>
        </div>

    </div>

    <!-- تأثير صوتي عند انتهاء البومودورو (تأثير نغمة رقمية بييب مدمجة) -->
    <script>
        let sessionData = { name: "", hours: 0, todos: [] };
        const storageKey = "STUDY_HUB_SESSION_DATA";

        // متغيرات العداد
        let timerLoop = null;
        let timeRemaining = 25 * 60; // 25 دقيقة بالثواني
        let isWorkSession = true; // true = تركيز، false = راحة

        function switchPanel(from, to) {
            document.getElementById(`step${from}`).classList.remove("active");
            document.getElementById(`step${to}`).classList.add("active");
        }

        function goToStep2() {
            let name = document.getElementById("userName").value.trim();
            if(name === "") { alert("اكتب اسمك أولاً يا بطل!"); return; }
            sessionData.name = name;
            document.getElementById("timeLabel").innerText = `يا ${name}، شحال من ساعة تقدر تخصصها للمراجعة اليوم؟`;
            switchPanel(1, 2);
        }

        function initializeDashboard() {
            let hours = parseInt(document.getElementById("studyHours").value);
            if(isNaN(hours) || hours <= 0) { alert("يرجى إدخال عدد ساعات حقيقي!"); return; }
            sessionData.hours = hours;
            
            saveToMemory();
            setupDashboardUI();
            switchPanel(2, 3);
        }

        function setupDashboardUI() {
            document.getElementById("statName").innerText = sessionData.name;
            document.getElementById("statHours").innerText = sessionData.hours;
            renderTodos();
        }

        // إضافة هدف جديد
        function addTodo() {
            let input = document.getElementById("todoInput");
            let text = input.value.trim();
            if(text === "") return;

            sessionData.todos.push({
                id: Date.now(),
                text: text,
                completed: false
            });

            input.value = "";
            saveToMemory();
            renderTodos();
        }

        // تشطيب وتأكيد الهدف عند الضغط عليه (علامة صح)
        function toggleTodo(id) {
            sessionData.todos = sessionData.todos.map(todo => {
                if(todo.id === id) todo.completed = !todo.completed;
                return todo;
            });
            saveToMemory();
            renderTodos();
        }

        // حذف هدف
        function deleteTodo(id, event) {
            event.stopPropagation(); // منع تشغيل دالة التشطيب عند الضغط على زر الحذف
            sessionData.todos = sessionData.todos.filter(todo => todo.id !== id);
            saveToMemory();
            renderTodos();
        }

        // عرض قائمة الأهداف وتحديث شريط التقدم الفوري
        function renderTodos() {
            let listElement = document.getElementById("todoList");
            listElement.innerHTML = "";

            let completedCount = 0;
            sessionData.todos.forEach(todo => {
                if(todo.completed) completedCount++;

                let li = document.createElement("li");
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.onclick = () => toggleTodo(todo.id);

                li.innerHTML = `
                    <span class="check-icon">${todo.completed ? '✅' : '⭕'}</span>
                    <span class="todo-text">${todo.text}</span>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id}, event)">❌</button>
                `;
                listElement.appendChild(li);
            });

            // تحديث الأرقام والإحصائيات وشريط الإنجاز
            let total = sessionData.todos.length;
            document.getElementById("statCompleted").innerText = `${completedCount}/${total}`;
            
            let percentage = total > 0 ? (completedCount / total) * 100 : 0;
            document.getElementById("progressBar").style.width = `${percentage}%`;
        }

        /* أكواد العداد المطور بومودورو */
        function updateTimerDisplay() {
            let mins = Math.floor(timeRemaining / 60);
            let secs = timeRemaining % 60;
            document.getElementById("timerDisplay").innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if(timerLoop !== null) return;
            
            document.getElementById("btnStart").style.display = "none";
            document.getElementById("btnPause").style.display = "block";

            timerLoop = setInterval(() => {
                if(timeRemaining > 0) {
                    timeRemaining--;
                    updateTimerDisplay();
                } else {
                    // تشغيل صوت التنبيه الرقمي عند الصفر
                    playBeepAlert();
                    clearInterval(timerLoop);
                    timerLoop = null;

                    // تدوير الأدوار تلقائياً بين المراجعة والراحة
                    if(isWorkSession) {
                        isWorkSession = false;
                        timeRemaining = 5 * 60; // 5 دقائق راحة
                        document.getElementById("timerStatus").innerText = "☕ وقت راحة مستحقة (5 د)";
                        document.getElementById("timerStatus").style.color = "var(--neon-color)";
                    } else {
                        isWorkSession = true;
                        timeRemaining = 25 * 60; // العودة للمراجعة
                        document.getElementById("timerStatus").innerText = "🎯 جلسة تركيز ومراجعة (25 د)";
                        document.getElementById("timerStatus").style.color = "var(--neon-green)";
                    }
                    updateTimerDisplay();
                    startTimer(); // إعادة تشغيل الجلسة الجديدة تلقائياً
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerLoop);
            timerLoop = null;
            document.getElementById("btnStart").style.display = "block";
            document.getElementById("btnPause").style.display = "none";
        }

        function resetTimer() {
            pauseTimer();
            isWorkSession = true;
            timeRemaining = 25 * 60;
            document.getElementById("timerStatus").innerText = "🎯 جلسة تركيز ومراجعة (25 د)";
            document.getElementById("timerStatus").style.color = "var(--neon-green)";
            updateTimerDisplay();
        }

        function playBeepAlert() {
            // توليد صوت تنبيه ديجيتال مباشرة من المتصفح بدون ملف خارجي لضمان اشتغاله 100%
            let context = new (window.AudioContext || window.webkitAudioContext)();
            let osc = context.createOscillator();
            osc.type = "sine";
            osc.frequency.value = 800; 
            osc.connect(context.destination);
            osc.start();
            setTimeout(() => osc.stop(), 500);
        }

        /* إدارة الذاكرة المحلية */
        function saveToMemory() {
            localStorage.setItem(storageKey, JSON.stringify(sessionData));
        }

        function resetEverything() {
            if(confirm("هل راك باغي دخل معلومات جديدة؟")) {
                localStorage.removeItem(storageKey);
                resetTimer();
                document.getElementById("userName").value = "";
                document.getElementById("studyHours").value = "";
                sessionData = { name: "", hours: 0, todos: [] };
                switchPanel(3, 1);
            }
        }

        // استعادة البيانات فوراً عند تحميل الصفحة
        window.onload = function() {
            let saved = localStorage.getItem(storageKey);
            if(saved) {
                sessionData = JSON.parse(saved);
                setupDashboardUI();
                updateTimerDisplay();
                switchPanel(1, 3);
            }
        }
    </script>
</body>
</html>
