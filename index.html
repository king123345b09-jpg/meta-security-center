<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع المانقيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f172a; /* كحلي ملكي عميق */
            --accent: #2563eb;  /* أزرق حيوي */
            --bg: #f8fafc;      /* خلفية هادئة */
            --text: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary), #1e293b);
            padding: 30px 25px;
            text-align: center;
            color: white;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 30px;
            text-align: center;
        }

        .image-container {
            width: 100%;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 4px solid #f1f5f9;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .question-text {
            font-size: 20px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 45%;
            justify-content: center;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-yes {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-yes:hover {
            background-color: #1d4ed8;
        }

        .btn-no {
            background-color: #f1f5f9;
            color: var(--text);
            border: 1px solid #cbd5e1;
        }

        .btn-no:hover {
            background-color: #e2e8f0;
        }

        .result-panel {
            display: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 5px;
            animation: slideUp 0.4s ease forwards;
            line-height: 1.6;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-panel {
            background-color: #fefce8;
            color: #854d0e;
            border: 1px solid #fef08a;
        }

        .info-panel {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .btn-back {
            background-color: var(--primary);
            color: white;
            margin: 25px auto 0 auto;
            width: auto;
            padding: 10px 25px;
            font-size: 15px;
        }

        .btn-back:hover {
            background-color: #1e293b;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="card-header">
            <h1>منصة التحقق من الأصدقاء</h1>
        </div>

        <div class="card-body">
            <div class="image-container">
                <img src="friends.jpg" alt="صورة التحقق">
            </div>

            <div id="quiz-section">
                <p class="question-text">هتعرف هاذو المناقيل ولا لا؟</p>
                <div class="btn-group">
                    <button class="btn btn-yes" onclick="processSelection('yes')">
                        <i class="fa-solid fa-user-check"></i> واه نعرفهم
                    </button>
                    <button class="btn btn-no" onclick="processSelection('no')">
                        <i class="fa-solid fa-user-xmark"></i> لا مانعرفهمش
                    </button>
                </div>
            </div>

            <div id="result-section" class="hidden">
                <div id="panel-box" class="result-panel"></div>
                
                <button class="btn btn-back" onclick="returnToStart()">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> عودة للخلف
                </button>
            </div>
        </div>
    </div>

    <script>
        function processSelection(status) {
            const quizSection = document.getElementById('quiz-section');
            const resultSection = document.getElementById('result-section');
            const panelBox = document.getElementById('panel-box');

            quizSection.classList.add('hidden');
            resultSection.classList.remove('hidden');

            if (status === 'yes') {
                // النص الذي يظهر للجميع عند الضغط على زر "نعم"
                panelBox.className = "result-panel success-panel";
                panelBox.innerHTML = "<i class='fa-solid fa-user-group' style='margin-left:8px;'></i>مليح هاذو هوما المناقيل الطحانين لي يضل يعطو هههههههه!";
            } else {
                // النص الذي يظهر للجميع عند الضغط على زر "لا"
                panelBox.className = "result-panel info-panel";
                panelBox.innerHTML = "<i class='fa-solid fa-circle-info' style='margin-left:8px;'></i>هاذو هوما عبدو ومحمد إذا صتهم مادورش معاهم";
            }
        }

        function returnToStart() {
            document.getElementById('quiz-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
        }
    </script>
</body>
</html>
