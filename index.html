<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعرفهم؟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <img src="friends.jpg" alt="صورة المناقيل" class="profile-img">
        
        <h2 id="question">تعرف هاذو المناقيل ولا لا؟</h2>
        
        <div class="buttons-container" id="buttons-box">
            <button class="btn btn-yes" onclick="showResult('yes')">نعم</button>
            <button class="btn btn-no" onclick="showResult('no')">لا</button>
        </div>

        <div id="result-message" class="result-box hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
